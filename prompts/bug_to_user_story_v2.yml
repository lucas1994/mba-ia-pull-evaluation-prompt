      Exemplo de uso adicional - App offline-first com conflitos, upload, ordenação e memória:

      Relato de Bug:
      App mobile offline-first com bugs críticos de sincronização.

      CONTEXTO:
      App iOS e Android usado por vendedores em campo, frequentemente sem conexão.

      PROBLEMAS:
      1. CONFLITO:
      - Usuário A edita tarefa offline
      - Usuário B edita a mesma tarefa offline
      - Ambos sincronizam
      - Sistema usa last write wins
      - Dados de um usuário são sobrescritos sem aviso

      2. UPLOAD:
      - Usuário anexa PDF de 50MB
      - Conexão 4G cai no meio do upload
      - App reinicia upload do zero
      - Após 5 tentativas, desiste sem avisar
      - Tarefa fica sincronizada sem anexo

      3. ORDENAÇÃO:
      - Usuário cria, edita e deleta a mesma tarefa offline
      - Servidor recebe DELETE antes do CREATE
      - Retorna 404
      - CREATE e UPDATE são aplicados depois
      - Tarefa reaparece mesmo devendo estar deletada

      4. MEMÓRIA:
      - Usuário fica 1 semana offline
      - Acumula 1.500 operações pendentes
      - App carrega tudo em memória
      - iOS mostra Memory Warning
      - Android lança OutOfMemoryError
      - Pico medido: 850MB

      IMPACTO:
      - 250+ usuários afetados
      - 30+ casos de compromissos perdidos por semana
      - NPS caiu de 8.5 para 4.2
      - Churn aumentou 15%
      - R$ 200k em oportunidades perdidas

      User Story gerada:
      ```
      Como um vendedor usando o app em campo, eu quero que minhas alterações offline sejam sincronizadas de forma confiável sem perda de dados, para que eu possa trabalhar com tranquilidade mesmo em áreas sem conexão.

      === USER STORY PRINCIPAL ===

      Título: Sincronização confiável e resiliente para operações offline

      Descrição:
      Como um usuário mobile trabalhando frequentemente offline, eu quero que todas as minhas alterações sejam sincronizadas corretamente quando houver conexão, sem perda de dados, conflitos mal resolvidos ou crashes, para que eu possa confiar no app como ferramenta crítica de trabalho.

      === CRITÉRIOS DE ACEITAÇÃO ===

      A. Conflitos - Resolução inteligente com aviso ao usuário:
      - Dado que dois usuários editam a mesma tarefa offline
      - Quando ambos sincronizam
      - Então o sistema deve detectar o conflito
      - E deve criar uma cópia de backup da versão conflitante
      - E deve notificar ambos os usuários sobre o conflito
      - E deve permitir escolher qual versão manter manualmente

      B. Upload Resiliente - Retomada de upload de anexos grandes:
      - Dado que estou enviando um anexo de 50MB
      - Quando a conexão cai durante o upload
      - Então o app deve salvar o progresso com checkpoints a cada 5MB
      - E ao reconectar, deve retomar do último checkpoint
      - E deve mostrar progresso em tempo real
      - E se falhar após 5 tentativas, deve manter o anexo na fila e avisar o usuário
      - E a tarefa não deve ser marcada como sincronizada enquanto o anexo não for enviado

      C. Ordenação Garantida - Operações aplicadas na ordem correta:
      - Dado que realizo múltiplas operações offline em sequência
      - Quando sincronizo com o servidor
      - Então as operações devem ser aplicadas na ordem cronológica correta
      - E cada operação deve ter client_timestamp
      - E o servidor deve respeitar a ordem baseada no timestamp do cliente
      - E operações dependentes, como create → update → delete, devem ser atômicas

      D. Sincronização em Lote - Sem crash com muitos itens pendentes:
      - Dado que tenho 1.500 operações pendentes após 1 semana offline
      - Quando inicio a sincronização
      - Então o app deve processar em lotes de 50 itens
      - E deve liberar memória entre lotes
      - E não deve ultrapassar 500MB de memória
      - E deve mostrar progresso, como "Sincronizando 150/1500"
      - E deve permitir pausar e retomar a sincronização

      === CRITÉRIOS TÉCNICOS ===

      Resolução de Conflitos:
      - Implementar CRDTs ou vector clocks para detectar conflitos
      - Usar estratégia híbrida:
        - Auto-merge para campos independentes
        - Resolução manual para campos conflitantes, como horário de reunião
      - Manter histórico de versões para rollback
      - Nunca usar last write wins como estratégia primária para dados críticos

      Upload Resiliente:
      - Implementar chunked upload com checkpoints
      - Dividir arquivos grandes em chunks de 5MB
      - Criar fluxo:
        1. POST /api/uploads/initiate retorna upload_id
        2. PUT /api/uploads/{upload_id}/chunk/{n} envia cada chunk
        3. POST /api/uploads/{upload_id}/complete finaliza o upload
        4. GET /api/uploads/{upload_id}/status retorna último chunk recebido
        5. Cliente retoma do próximo chunk pendente
      - Usar retry com exponential backoff
      - Persistir estado do upload localmente

      Ordenação:
      - Implementar operation log persistente
      - Cada operação deve conter id, type, entity, entity_id, data, client_timestamp e device_id
      - Servidor deve aplicar operações por client_timestamp, não por ordem de chegada
      - Operações dependentes devem ser processadas de forma atômica
      - Operações repetidas devem ser idempotentes

      Sincronização em Lote:
      - Contar operações pendentes antes de iniciar
      - Dividir em lotes de 50 operações
      - Carregar cada lote a partir do SQLite local
      - Enviar para POST /api/sync/batch
      - Marcar como sincronizado no local após confirmação do servidor
      - Liberar memória após cada lote
      - Atualizar UI com progresso do lote
      - Aplicar rate limiting de até 5 lotes por segundo

      Memória:
      - Usar SQLite cursor para não carregar tudo em memória
      - Processar registros em streaming
      - Limpar cache após cada lote
      - Monitorar memória durante a sync
      - Pausar sincronização se memória ultrapassar 400MB
      - Manter pico abaixo de 500MB

      === CONTEXTO DO BUG ===

      Severidade: CRÍTICA

      Impacto Business:
      - 250+ usuários afetados
      - 30+ casos de compromissos perdidos por semana
      - NPS caiu de 8.5 para 4.2
      - Churn aumentou 15%
      - R$ 200k em oportunidades perdidas

      Problemas Técnicos:
      1. Last-write-wins sem detecção de conflito
      2. Upload não suporta retomada
      3. Operações aplicadas fora de ordem
      4. Sync carrega tudo em memória e causa OOM

      Componentes Afetados:
      - App mobile iOS e Android
      - Banco local SQLite
      - Backend de sincronização
      - API de upload
      - UI de progresso e resolução de conflitos

      === TASKS TÉCNICAS SUGERIDAS ===

      Fase 1 - Hotfix Urgente:
      1. [MEMORY] Implementar sync em lotes de 50 itens
      2. [UPLOAD] Corrigir status para não marcar tarefa como sincronizada sem anexo
      3. [UPLOAD] Adicionar retry com exponential backoff
      4. [MONITOR] Adicionar logs de erro de sync

      Fase 2 - Core Fixes:
      5. [CONFLICT] Implementar detecção básica de conflitos
      6. [CONFLICT] Criar UI para resolução manual de conflitos
      7. [UPLOAD] Implementar chunked upload com retomada
      8. [ORDER] Adicionar client_timestamp e device_id em todas as operações
      9. [ORDER] Fazer servidor aplicar operações em ordem de timestamp

      Fase 3 - Arquitetura Robusta:
      10. [CONFLICT] Migrar para CRDTs ou vector clocks
      11. [SYNC] Implementar operation log persistente
      12. [PERF] Otimizar queries SQLite e adicionar índices
      13. [MONITOR] Criar dashboard de sync health

      Fase 4 - UX, Testes e Documentação:
      14. [UX] Melhorar feedback de progresso de sync
      15. [UX] Permitir pausar e retomar sincronização
      16. [TESTS] Criar testes de sync com 10k+ operações
      17. [DOCS] Documentar arquitetura de sincronização

      === MÉTRICAS DE SUCESSO ===

      Antes vs Depois:
      - Perda de dados: 30+ casos/semana → 0 casos/semana
      - Crash rate em sync: recorrente → <1%
      - NPS: 4.2 → >7.5
      - Sync success rate: falhas silenciosas → >99%
      - Tempo de sync para 1000 itens: crash → <60s
      - Memória durante sync: 850MB → <500MB
      ```




