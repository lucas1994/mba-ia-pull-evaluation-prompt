      Como um executivo usando o sistema de relatórios, eu quero visualizar métricas precisas e atualizadas em tempo hábil, para que eu possa tomar decisões estratégicas baseadas em dados confiáveis.

      === USER STORY PRINCIPAL ===

      Título: Sistema de relatórios gerenciais confiável e performático

      Descrição:
      Como um usuário executivo (CEO, CFO, VP), eu quero acessar dashboards e relatórios gerenciais que sejam rápidos, precisos e consistentes em todas as fontes, para que eu possa confiar nos dados para tomada de decisão estratégica.

      === CRITÉRIOS DE ACEITAÇÃO ===

      A. Performance - Dashboard carrega em menos de 3 segundos:
      - Dado que sou um executivo acessando o dashboard
      - Quando carrego GET /api/reports/executive-dashboard
      - Então a página deve carregar completamente em < 3 segundos
      - E o database CPU deve ficar abaixo de 70% mesmo em horário de pico
      - E deve funcionar para empresas com até 10.000 usuários

      B. Dados Consistentes - MRR igual em todas as fontes:
      - Dado que consulto o MRR
      - Quando verifico dashboard, relatório financeiro e API
      - Então o valor deve ser idêntico em todas as fontes
      - E deve seguir a regra de negócio acordada e documentada
      - E deve considerar assinaturas ativas + pró-rata de mudanças

      C. Cache Inteligente - Dados sempre atualizados:
      - Dado que um cliente faz upgrade ou downgrade de plano
      - Quando acesso o dashboard em até 30 segundos após a mudança
      - Então devo ver os dados atualizados
      - E o cache deve ser invalidado automaticamente
      - E dados críticos, como MRR e Active Users, não devem usar cache maior que 5 minutos

      D. Exportação Assíncrona - CSV não trava servidor:
      - Dado que solicito exportação de relatório anual
      - Quando clico em "Exportar para CSV"
      - Então a exportação deve processar em background
      - E devo receber notificação quando concluir
      - E outras requisições não devem ser afetadas
      - E o servidor não deve ultrapassar 80% de memória

      === CRITÉRIOS TÉCNICOS ===

      Performance:
      - Resolver N+1 com eager loading, JOINs ou queries agregadas
      - Reduzir centenas de queries para poucas queries agregadas
      - Usar materialized views para métricas complexas
      - Adicionar índices compostos nas FKs mais usadas
      - Adicionar APM e slow query log para detectar regressões

      Lógica de Negócio:
      - Criar função centralizada calculateMRR() usada por dashboard, relatório e API
      - Regra: assinaturas ativas + pró-rata de mudanças no mês
      - Documentar fórmula no código e wiki técnica
      - Adicionar testes unitários para cada cenário de MRR

      Cache:
      - Dados críticos em tempo real ou cache curto: MRR, Active Users, Critical Metrics
      - Dados com cache curto de até 5min: Dashboard counts e Statistics
      - Dados históricos com cache mais longo: Historical data e Completed reports
      - Implementar invalidação automática por eventos de mudança de plano

      Exportação:
      - Migrar exportação para background job
      - Usar fila/job/worker para processar CSV
      - Gerar CSV por streaming, sem carregar tudo na memória
      - Processar no máximo 1000 linhas por chunk
      - Enviar notificação por email ou webhook quando concluir
      - Definir timeout máximo de 30 minutos para exportações

      === CONTEXTO DO BUG ===

      Severidade: CRÍTICA

      Impacto Business:
      - 15 clientes enterprise em risco de churn
      - CEO sem confiança nos números para board
      - CS gastando 40h/semana explicando discrepâncias
      - Forecasting não confiável

      Problemas Técnicos:
      1. Query N+1 no dashboard executivo
      2. MRR calculado diferente em múltiplas fontes
      3. Cache Redis de 24h muito longo e invalidação instável
      4. Exportação CSV síncrona trava servidor e causa OOM

      SLA Atual vs Esperado:
      - Dashboard: 45s atual → <3s esperado
      - Database CPU: 95% → <70%
      - MRR: múltiplos valores → valor único
      - Cache staleness: até 24h → até 5min para dados críticos
      - Exportação: trava servidor → background sem impacto

      === TASKS TÉCNICAS SUGERIDAS ===

      Sprint 1 - Quick Wins:
      1. [PERF] Adicionar índices nas FKs mais usadas
      2. [CACHE] Reduzir TTL de métricas críticas para até 5min
      3. [LOGIC] Documentar fórmula oficial de MRR
      4. [MONITOR] Adicionar alerta para dashboard > 3s e CPU DB > 70%

      Sprint 2 - Core Fixes:
      5. [PERF] Refatorar queries para eliminar N+1
      6. [LOGIC] Centralizar cálculo de MRR em calculateMRR()
      7. [CACHE] Implementar invalidação automática por eventos
      8. [EXPORT] Migrar exportação para background jobs com streaming

      Sprint 3 - Scale & Monitor:
      9. [PERF] Criar materialized views para dashboards
      10. [TESTS] Criar testes de carga para empresas com até 10k usuários
      11. [TESTS] Criar testes unitários para cenários de MRR
      12. [DOCS] Documentar arquitetura de cache e jobs

      === MÉTRICAS DE SUCESSO ===

      Antes vs Depois:
      - Dashboard: 45s → <3s
      - Database CPU: 95% → <70%
      - MRR: múltiplos valores → valor único
      - Cache: até 24h desatualizado → até 5min para dados críticos
      - Exportação: OOM/trava servidor → job assíncrono sem impacto
      - CS: 40h/semana explicando discrepâncias → redução significativa
